repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, pydantic-settings, types-PyYAML]
        args: [src/secondbrain]
  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest quick
        entry: pytest -q --tb=no -x
        language: system
        pass_filenames: false
        always_run: true
